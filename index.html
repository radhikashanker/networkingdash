<style>

.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.st{font-size:17px;font-weight:700}.sc2{font-size:12px;color:var(--t2);font-family:'DM Mono',monospace}

<body>
<div id="root"></div>
<script>
const {useState,useMemo}=React;

function cleanStr(s){return(s||'').trim().replace(/^\uFEFF/,'');}

/* ─ INFERENCE ─ */
function infer_sen(p=''){
  const s=p.toLowerCase();
  if(/\bfounder\b|co-?founder/.test(s))return'Founder';
  if(/\bceo\b|\bcoo\b|\bcto\b|\bcmo\b|\bcfo\b|\bchief\b|\bpresident\b/.test(s))return'C-Suite';
  if(/recruiter|talent acq|talent partner|sourcer|talent scout/.test(s))return'Recruiter';
  if(/\bhr\b|human resource|people ops|people partner/.test(s))return'Recruiter';
  if(/\bsvp\b|\bevp\b|\bavp\b|\bvp\b|vice pres/.test(s))return'VP';
  if(/\bdirector\b|\bhead of\b|\bhead,/.test(s))return'Director';
  if(/\bsenior\b|\bsr\.?\b|\blead\b|\bprincipal\b|\bstaff\b/.test(s))return'Senior';
  if(/\bmanager\b|\bmgr\b/.test(s))return'Manager';
  return'IC / Peer';
}
function infer_fn(p=''){
  const s=p.toLowerCase();
  if(/recruit|talent|sourcer/.test(s))return'Recruitment & Talent';
  if(/\bfounder\b|co-?founder|\bceo\b|\bowner\b/.test(s))return'Founder';
  if(/investor|venture|\bvc\b/.test(s))return'Investor / VC';
  if(/market|brand|growth|content|social|seo|digital|campaign|comms|\bpr\b/.test(s))return'Marketing';
  if(/engineer|develop|software|data|\bai\b|\bml\b|product|backend|frontend|devops/.test(s))return'Tech & Engineering';
  if(/sales|business dev|biz dev|account exec|revenue/.test(s))return'Sales';
  if(/financ|account|audit|treasury/.test(s))return'Finance';
  if(/design|creative|\bux\b|\bui\b|art direct|visual/.test(s))return'Creative & Design';
  if(/\bhr\b|human res|people/.test(s))return'People & HR';
  if(/operat|supply chain|logis|procure/.test(s))return'Operations';
  if(/consult|advisor/.test(s))return'Consulting';
  return'Other';
}
function infer_ind(c='',p=''){
  const t=(c+' '+p).toLowerCase();
  if(/beauty|cosmetic|skincare|makeup|fragrance|perfume|l.?oreal|sephora|byoma|estee|glossier|\bnyx\b|clinique|nivea|olay/.test(t))return'Beauty & Personal Care';
  if(/\bwellness\b|\byoga\b|meditation|\bspa\b|pilates|\bfitness\b|\bgym\b|\bsport\b|\bnike\b|\badidas\b|lululemon/.test(t))return'Wellness & Fitness';
  if(/\bluxury\b|\bfashion\b|jeweller|\bwatch\b|omega|longines|\brado\b|cartier|\bgucci\b|\blvmh\b|chalhoub|rivoli|swarovski|\bcoach\b|landmark group/.test(t))return'Luxury & Lifestyle';
  if(/\brestaurant\b|\bfood\b|\bbeverage\b|\bcafe\b|\bhotel\b|hospitality|zomato|deliveroo|talabat|\bswiggy\b|catering/.test(t))return'F&B & Hospitality';
  if(/health.?tech|medtech|pharma|medical|\bclinic\b|hospital|biotech|digital health/.test(t))return'Health Tech';
  if(/\bretail\b|ecommerce|e-commerce|\bamazon\b|\bnoon\b|namshi|shopify|marketplace/.test(t))return'Retail & E-commerce';
  if(/mckinsey|\bbain\b|\bbcg\b|kearney|deloitte|\bpwc\b|\bkpmg\b|\bey\b|accenture|\bagency\b|advertising/.test(t))return'Agency & Consulting';
  if(/\bbank\b|financ|\binvest\b|\bfund\b|\bcapital\b|asset management|wealth|insurance|fintech|payment/.test(t))return'Finance & Banking';
  if(/\btech\b|software|\bsaas\b|\bplatform\b|\bcloud\b|\bai\b|startup|zapier|microsoft|google|\bmeta\b|\bapple\b/.test(t))return'Tech & SaaS';
  if(/\bmedia\b|publish|\bnews\b|\btv\b|\bfilm\b|entertainment|streaming|podcast|spotify/.test(t))return'Media & Content';
  if(/educat|university|\bschool\b|training|learning|\bcourse\b/.test(t))return'Education';
  if(/real.?estate|\bproperty\b|proptech|realty/.test(t))return'Real Estate';
  return'Other';
}
function infer_connWarmth(d=''){
  if(!d)return'Cold';
  const mo={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const p=d.trim().split(' ');
  let dt=p.length===3?new Date(+p[2],(mo[p[1]]??0),+p[0]):new Date(d);
  if(isNaN(dt))return'Cold';
  const m=(Date.now()-dt)/(1000*60*60*24*30);
  if(m<=3)return'Hot';if(m<=12)return'Warm';if(m<=24)return'Cooling';return'Cold';
}

/* ─ MESSAGES: URL-based matching ─ */
function parseMessages(txt){
  const clean=txt.replace(/^\uFEFF/,'');
  const r=Papa.parse(clean,{header:true,skipEmptyLines:true,transformHeader:h=>h.trim().toUpperCase()});
  if(!r.data||r.data.length===0)return{urlMap:{},myUrl:''};
  // Auto-detect user's own URL = most frequent sender
  const senderCounts={};
  r.data.forEach(row=>{
    const su=(row['SENDER PROFILE URL']||'').trim().replace(/\/$/,'').toLowerCase();
    if(su)senderCounts[su]=(senderCounts[su]||0)+1;
  });
  const myUrl=Object.entries(senderCounts).sort((a,b)=>b[1]-a[1])[0]?.[0]||'';
  const urlMap={};
  r.data.forEach(row=>{
    const su=(row['SENDER PROFILE URL']||'').trim().replace(/\/$/,'').toLowerCase();
    const ru=(row['RECIPIENT PROFILE URLS']||row['RECIPIENT PROFILE URL']||'').trim().replace(/\/$/,'').toLowerCase();
    const dateStr=(row['DATE']||'').trim();
    if(!dateStr)return;
    const d=new Date(dateStr.replace(' UTC','Z').replace(' ','T'));
    if(isNaN(d.getTime()))return;
    const other=su===myUrl?ru:su;
    if(!other||other===myUrl||other.length<10)return;
    const key=other.replace(/\/$/,'');
    if(!urlMap[key]||d.getTime()>urlMap[key].getTime())urlMap[key]=d;
  });
  console.log('Messages parsed. Contacts:',Object.keys(urlMap).length,'myUrl:',myUrl);
  return{urlMap,myUrl};
}
function matchByUrl(connUrl,urlMap){
  if(!connUrl||!urlMap||!Object.keys(urlMap).length)return null;
  const key=connUrl.toLowerCase().replace(/\/$/,'');
  return urlMap[key]||null;
}
function getMsgWarmth(lastMsgDate){
  if(!lastMsgDate)return null;
  const m=(Date.now()-lastMsgDate)/(1000*60*60*24*30);
  if(m<=1)return'Active';if(m<=3)return'Hot';if(m<=12)return'Warm';if(m<=24)return'Cooling';return'Cold';
}

/* ─ PARSE CONNECTIONS ─ */
function parseCSV(txt,urlMap={}){
  const clean=txt.replace(/^\uFEFF/,'');
  const lines=clean.split('\n');
  const hi=lines.findIndex(l=>l.includes('First Name'));
  if(hi===-1)return[];
  const r=Papa.parse(lines.slice(hi).join('\n'),{header:true,skipEmptyLines:true,transformHeader:h=>h.trim()});
  return r.data.map((row,i)=>{
    const firstName=cleanStr(row['First Name']);
    const lastName=cleanStr(row['Last Name']);
    const name=`${firstName} ${lastName}`.trim();
    const email=cleanStr(row['Email Address']||'');
    const company=cleanStr(row['Company']);
    const position=cleanStr(row['Position']);
    const connectedOn=cleanStr(row['Connected On']);
    const url=cleanStr(row['URL']);
    const connectionWarmth=infer_connWarmth(connectedOn);
    // Connection age in months
    const cp=connectedOn.trim().split(' ');
    const cmo={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
    const cdt=cp.length===3?new Date(+cp[2],(cmo[cp[1]]??0),+cp[0]):new Date(connectedOn);
    const connMonthsAgo=isNaN(cdt.getTime())?999:(Date.now()-cdt.getTime())/(1000*60*60*24*30);
    // Message data — URL-based match
    const msgDate=matchByUrl(url,urlMap);
    const lastMessageDate=msgDate?msgDate.getTime():null;
    const messageWarmth=getMsgWarmth(lastMessageDate);
    const effectiveWarmth=messageWarmth||connectionWarmth;
    return{
      id:i,firstName,name,email,company,position,connectedOn,url,
      seniority:infer_sen(position),fn:infer_fn(position),
      industry:infer_ind(company,position),
      connectionWarmth,messageWarmth,warmth:effectiveWarmth,
      lastMessageDate,connMonthsAgo,
      hasEmail:!!(email&&email.length>3&&email.includes('@')),
    };
  }).filter(c=>c.name.trim().length>0);
}

/* ─ SCORING ─ */
function msgScore(c){
  if(!c.lastMessageDate)return 0;
  const m=(Date.now()-c.lastMessageDate)/(1000*60*60*24*30);
  if(m<=1)return 60;if(m<=3)return 45;if(m<=12)return 30;if(m<=24)return 15;return 5;
}
function connScore(c){
  const m=c.connMonthsAgo||999;
  if(m<=3)return 20;if(m<=12)return 12;if(m<=24)return 5;return 2;
}
function scoreC(c,mode,intent){
  const base=c.lastMessageDate?msgScore(c):connScore(c);
  let s=base;
  if(mode==='job'){
    const tgts=(intent.companies||'').toLowerCase().split(',').map(x=>x.trim()).filter(Boolean);
    if(tgts.some(t=>c.company.toLowerCase().includes(t)))s+=60;
    if(c.seniority==='Recruiter')s+=50;
    if((intent.industry||'')&&c.industry.toLowerCase().includes((intent.industry||'').toLowerCase()))s+=30;
    if(['Director','VP','C-Suite'].includes(c.seniority))s+=20;
  }else if(mode==='pivot'){
    const ti=(intent.industry||'').toLowerCase();
    if(ti&&c.industry.toLowerCase().includes(ti))s+=60;
    if(['Director','VP','C-Suite','Founder'].includes(c.seniority))s+=25;
  }else if(mode==='clients'){
    if(['Founder','C-Suite','VP','Director'].includes(c.seniority))s+=60;
    const ti=(intent.industries||'').toLowerCase();
    if(ti&&ti.split(',').some(x=>c.industry.toLowerCase().includes(x.trim())))s+=40;
    if(c.hasEmail)s+=20;
  }else if(mode==='city'){
    const ct=(intent.city||'').toLowerCase();
    if(ct&&(c.company.toLowerCase().includes(ct)||c.position.toLowerCase().includes(ct)))s+=50;
  }else{
    const ti=(intent.targetIndustries||'').toLowerCase().split(',').map(x=>x.trim()).filter(Boolean);
    if(ti.some(x=>x&&c.industry.toLowerCase().includes(x)))s+=50;
    if(['Director','VP','C-Suite','Founder'].includes(c.seniority))s+=30;
  }
  return s;
}

function whyC(c,mode,intent){
  if(mode==='job'){

/* ─ HEALTH SCORE ─ */
function calcHealth(conns,hasMessages){
  const n=conns.length;if(!n)return{score:0,grade:'—',comps:[],tip:''};
  const inds=new Set(conns.map(c=>c.industry)).size;
  const sp=conns.filter(c=>['Founder','C-Suite','VP','Director'].includes(c.seniority)).length/n;
  const rp=conns.filter(c=>['Hot','Warm','Active'].includes(c.warmth)).length/n;
  const geo=new Set(conns.map(c=>{const t=c.company.toLowerCase();if(t.includes('dubai')||t.includes('uae'))return'UAE';if(t.includes('saudi')||t.includes('ksa'))return'KSA';if(t.includes('london')||t.includes(' uk'))return'UK';if(t.includes('india')||t.includes('mumbai')||t.includes('delhi'))return'India';if(t.includes('usa')||t.includes('york')||t.includes('francisco'))return'US';return null;})).size-1;
  const indScore=Math.min((inds/10)*20,20);
  const senScore=Math.min((sp/.30)*25,25);
  const recScore=Math.min((rp/.50)*20,20);
  const geoScore=Math.min((Math.max(geo,0)/5)*15,15);
  const emailPct=conns.filter(c=>c.hasEmail).length/n;
  const msgPct=hasMessages?conns.filter(c=>c.lastMessageDate).length/n:0;
  const actScore=Math.min((emailPct/.10)*8,8)+Math.min((msgPct/.15)*12,12);
  const total=Math.round(indScore+senScore+recScore+geoScore+actScore);
  let grade,tip;
  if(total>=80){grade='Exceptional';tip='Top 5% of networks. Focus on activation, not growth.';}
  else if(total>=65){grade='Strong';tip='Solid foundation. Focus on warming cold connections.';}
  else if(total>=50){grade='Developing';tip='Good start. Diversify industries and seniority levels.';}
  else if(total>=35){grade='Early Stage';tip='Needs work. Prioritise senior contacts in target industries.';}
  else{grade='Just Starting';tip='Focus on strategic additions, not volume.';}
  return{score:total,grade,comps:[{l:'Industry Spread',v:Math.round(indScore),m:20},{l:'Seniority Mix',v:Math.round(senScore),m:25},{l:'Network Recency',v:Math.round(recScore),m:20},{l:'Geographic Reach',v:Math.round(geoScore),m:15},{l:'Activation',v:Math.round(actScore),m:20}],tip};
}

    out.push({t:cold>total*.5?'warn':'neu',i:'❄️',h:`${Math.round(cold/total*100)}% of your network was connected 2+ years ago.`,b:`${warm+hot} recently active contacts is your window. ${hasMessages?'Message data shows your truly active relationships.':'Upload Messages.csv to find who you actually still talk to.'}`,a:null});
    out.push({t:wEmail>0?'gold':'warn',i:'✉️',h:`${wEmail} connections have shared their email.`,b:wEmail>0?`Email gets 3× higher response than LinkedIn DMs. Highest-conversion targets.`:`No emails available — LinkedIn only shares when connections explicitly allow it.`,a:null});
  }else if(mode==='pivot'){
    const ti=(intent.industry||'').toLowerCase();
    const ins=ti?conns.filter(c=>c.industry.toLowerCase().includes(ti)):[];
    const si=ins.filter(c=>['Director','VP','C-Suite','Founder'].includes(c.seniority));
    const wi=ins.filter(c=>['Hot','Warm','Active'].includes(c.warmth));
    out.push({t:ins.length>10?'pos':'warn',i:'🔄',h:`You already know ${ins.length} people in ${intent.industry||'your target industry'}.`,b:ins.length>0?`${si.length} are senior enough to open a door.`:`You're starting cold. Build credibility before pitching yourself.`,a:ins.length>0?'View insiders':null});
    out.push({t:'gold',i:'🌉',h:'Bridge contacts are your unfair advantage.',b:`People who've made a similar move skip the skepticism and get straight to helping.`,a:null});
    out.push({t:wi.length>0?'pos':'neu',i:'🔥',h:`${wi.length} of your ${ins.length} insiders are recently active.`,b:wi.length>0?`Start with ${wi[0]?.name} — recent connections convert 4× better.`:`Most insider connections are old. A personalised note works better than a generic re-engage.`,a:null});
  }else if(mode==='clients'){
    const ti=(intent.industries||'').toLowerCase().split(',').map(x=>x.trim()).filter(Boolean);
    const pc=conns.filter(c=>['Founder','C-Suite','VP','Director'].includes(c.seniority)&&(ti.length===0||ti.some(x=>c.industry.toLowerCase().includes(x))));
    const wc=pc.filter(c=>['Hot','Warm','Active'].includes(c.warmth));
    const ec=pc.filter(c=>c.hasEmail);
    out.push({t:'pos',i:'💼',h:`${pc.length} potential clients in your network right now.`,b:`${wc.length} are recently active. That's a pipeline most consultants would kill for.`,a:'View hit list'});
    out.push({t:wc.length>0?'pos':'neu',i:'🔥',h:`${wc.length} warm leads. Strike while the iron is hot.`,b:wc.length>0?`${wc[0].name} at ${wc[0].company} — ${wc[0].seniority}, recently active. First message this week.`:`Connections are cooling. A value-add touchpoint rewarms before a pitch.`,a:null});
    out.push({t:ec.length>0?'gold':'neu',i:'✉️',h:`${ec.length} potential clients have shared their email.`,b:`Email converts at 3× the rate of LinkedIn DMs. Start here.`,a:null});
    out.push({t:'warn',i:'⏰',h:`Don't let warm leads go cold.`,b:`Anyone active 6–12 months ago is starting to forget you. A simple touchpoint this week keeps the door open.`,a:null});
  }else if(mode==='city'){
    const ct=(intent.city||'').toLowerCase();
    const cc=ct?conns.filter(c=>c.company.toLowerCase().includes(ct)||c.position.toLowerCase().includes(ct)):[];
    const wcc=cc.filter(c=>['Hot','Warm','Active'].includes(c.warmth));

    out.push({t:'gold',i:'☕',h:'One coffee chat a week for 8 weeks changes your city.',b:`8 real relationships beat 800 LinkedIn connections. People who meet you IRL remember, refer, and invite you into rooms.`,a:null});
  }else{
    const inds=[...new Set(conns.map(c=>c.industry))];
    const gaps=inds.filter(i=>conns.filter(c=>c.industry===i).length<5);
    const top2=countBy(conns,'industry').slice(0,2);
    const tp=Math.round(top2.reduce((s,i)=>s+i.v,0)/total*100);
    const icC=conns.filter(c=>c.seniority==='IC / Peer').length;
    out.push({t:icC>total*.6?'warn':'pos',i:'📊',h:`${Math.round(senior.length/total*100)}% of your network is Director or above.`,b:icC>total*.6?`Skews junior. Strong for peer referrals, weak for doors and sponsorship.`:`Good seniority mix. Peer density AND decision-maker access — that's rare.`,a:null});
    out.push({t:'warn',i:'🏭',h:`${gaps.length} industries with fewer than 5 connections.`,b:`Every gap is a blind spot. One bad market cycle and your options shrink dramatically.`,a:null});
    out.push({t:tp>60?'warn':'neu',i:'⚖️',h:`${tp}% of your network concentrated in 2 industries.`,b:`${top2.map(i=>i.k).join(' and ')} dominate. Deliberate diversification protects your optionality.`,a:null});
    out.push({t:cold>total*.5?'warn':'neu',i:'❄️',h:`${Math.round(cold/total*100)}% of connections are cold.`,b:`Networks have a half-life. Add ${Math.round(total*.03)} new strategic connections this month.`,a:null});
    out.push({t:'gold',i:'🎯',h:`Your network is an asset. Treat it like one.`,b:`The strongest networks aren't the biggest — they're the most activated. 10 warm relationships open more doors than 5,000 passive ones.`,a:null});
  }
  return out.slice(0,6);
}
